# HAProxy Load Balancer Configuration
# Практика 22 - Балансировка нагрузки

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  10s
    timeout server  10s
    timeout http-request 10s
    retries 3

# Frontend для основного балансировщика (round-robin)
frontend http_front
    bind *:8080
    default_backend backend_servers
    
    # Статистика HAProxy
    stats enable
    stats uri /haproxy-stats
    stats refresh 5s
    stats admin if LOCALHOST

# Backend с балансировкой round-robin (по умолчанию)
backend backend_servers
    balance roundrobin
    
    # Health checks
    option httpchk GET /health
    http-check expect status 200
    
    # Параметры отказоустойчивости
    # inter - интервал между проверками (мс)
    # fall - количество неудачных проверок для исключения сервера
    # rise - количество успешных проверок для возврата сервера
    
    server backend1 127.0.0.1:3001 check inter 5000 fall 3 rise 2
    server backend2 127.0.0.1:3002 check inter 5000 fall 3 rise 2

# Backend с балансировкой leastconn (наименьшее количество соединений)
backend backend_least_conn
    balance leastconn
    
    option httpchk GET /health
    http-check expect status 200
    
    server backend1 127.0.0.1:3001 check inter 5000 fall 3 rise 2
    server backend2 127.0.0.1:3002 check inter 5000 fall 3 rise 2

# Backend с балансировкой source (по IP клиента)
backend backend_source
    balance source
    
    option httpchk GET /health
    http-check expect status 200
    
    server backend1 127.0.0.1:3001 check inter 5000 fall 3 rise 2
    server backend2 127.0.0.1:3002 check inter 5000 fall 3 rise 2

# Frontend для балансировки leastconn
frontend http_front_least_conn
    bind *:8083
    default_backend backend_least_conn

# Frontend для балансировки source
frontend http_front_source
    bind *:8084
    default_backend backend_source

# Statistics page
listen stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if LOCALHOST
