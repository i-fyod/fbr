# Nginx Load Balancer Configuration
# Практика 22 - Балансировка нагрузки

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Логирование для отслеживания балансировки
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Upstream блок с backend-серверами
    upstream backend_servers {
        # Балансировка по умолчанию (round-robin)
        # max_fails - количество неудачных попыток перед исключением сервера
        # fail_timeout - время исключения сервера после max_fails неудач
        
        server localhost:3001 max_fails=3 fail_timeout=30s;
        server localhost:3002 max_fails=3 fail_timeout=30s;
        
        # keepalive - количество постоянных соединений с backend
        keepalive 32;
    }

    # Альтернативный upstream с балансировкой по наименьшей загрузке
    upstream backend_least_conn {
        least_conn;  # Наименьшее количество соединений
        server localhost:3001 max_fails=3 fail_timeout=30s;
        server localhost:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Альтернативный upstream с балансировкой по IP (ip_hash)
    upstream backend_ip_hash {
        ip_hash;  # Запросы с одного IP идут на один сервер
        server localhost:3001 max_fails=3 fail_timeout=30s;
        server localhost:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Основной сервер балансировщика
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            # Заголовки для backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Таймауты
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Буферы
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API endpoints
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }
    }

    # Сервер с балансировкой least_conn
    server {
        listen 8081;
        server_name localhost;

        location / {
            proxy_pass http://backend_least_conn;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }
    }

    # Сервер с балансировкой ip_hash
    server {
        listen 8082;
        server_name localhost;

        location / {
            proxy_pass http://backend_ip_hash;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }
    }
}
