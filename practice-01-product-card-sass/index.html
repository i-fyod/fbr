<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Карточка товара</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="page">
      <article class="product-card" aria-label="Карточка товара">
        <div class="product-card__media">
          <img
            class="product-card__image"
            src="./assets/coffee.jpg"
            alt="Фото товара"
            width="960"
            height="720"
            loading="lazy"
          />
        </div>

        <div class="product-card__content">
          <h1 class="product-card__title">Кофе зерновой "Mokka"</h1>
          <p class="product-card__description">
            Насыщенный вкус с шоколадными нотами. Средняя обжарка, 100% арабика.
            Подходит для турки и эспрессо-машины.
          </p>

          <div class="product-card__meta">
            <a class="product-card__action" href="#">Подробнее</a>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
